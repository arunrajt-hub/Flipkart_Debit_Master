# Flipkart ODH Debit Master — same CI pattern as Meesho_DebitMaster_Automation:
#   - SERVICE_ACCOUNT_JSON (or GOOGLE_SERVICE_ACCOUNT_JSON) → service_account_key.json
#   - Optional GSPREAD_CREDENTIALS_JSON + GSPREAD_AUTHORIZED_USER_JSON → OAuth copy when source not shared with SA
#   - Chrome for WhatsApp sheet images
# Schedule: ~48h via daily cron + alternating Unix-day gate. Manual: Actions → Run workflow

name: Flipkart Debit Master Sync

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 48-hour gate (scheduled runs only)
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=yes" >> $GITHUB_OUTPUT
            echo "reason=workflow_dispatch" >> $GITHUB_OUTPUT
          else
            DAY=$(($(date +%s) / 86400))
            if [ $((DAY % 2)) -eq 1 ]; then
              echo "run=yes" >> $GITHUB_OUTPUT
              echo "reason=48h_cycle_day_$DAY" >> $GITHUB_OUTPUT
            else
              echo "run=no" >> $GITHUB_OUTPUT
              echo "reason=skip_off_cycle_day_$DAY" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Skip (between 48h windows)
        if: steps.gate.outputs.run != 'yes'
        run: |
          echo "Skipping scheduled run: ${{ steps.gate.outputs.reason }}"
          exit 0

      - name: Set up Python
        if: steps.gate.outputs.run == 'yes'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.gate.outputs.run == 'yes'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Chrome for WhatsApp image conversion
        if: steps.gate.outputs.run == 'yes'
        id: chrome
        uses: browser-actions/setup-chrome@v2
        with:
          install-chromedriver: true
          install-dependencies: true

      - name: Create service account key file
        if: steps.gate.outputs.run == 'yes'
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$SERVICE_ACCOUNT_JSON" ]; then
            python -c "import os, pathlib; pathlib.Path('service_account_key.json').write_text(os.environ['SERVICE_ACCOUNT_JSON'], encoding='utf-8')"
            echo "Service account key created (SERVICE_ACCOUNT_JSON)"
          elif [ -n "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            python -c "import os, pathlib; pathlib.Path('service_account_key.json').write_text(os.environ['GOOGLE_SERVICE_ACCOUNT_JSON'], encoding='utf-8')"
            echo "Service account key created (GOOGLE_SERVICE_ACCOUNT_JSON)"
          else
            echo "::error::Set repository secret SERVICE_ACCOUNT_JSON (same as Meesho) or GOOGLE_SERVICE_ACCOUNT_JSON."
            exit 1
          fi

      - name: Validate service account JSON (must be IAM key, not OAuth client)
        if: steps.gate.outputs.run == 'yes'
        run: |
          python << 'PY'
          import json, pathlib, sys
          p = pathlib.Path("service_account_key.json")
          raw = p.read_text(encoding="utf-8").strip()
          if not raw:
              print("::error::service_account_key.json is empty after writing from secret.")
              sys.exit(1)
          try:
              d = json.loads(raw)
          except json.JSONDecodeError as e:
              print(f"::error::SERVICE_ACCOUNT_JSON is not valid JSON: {e}")
              sys.exit(1)
          if d.get("type") != "service_account":
              print("::error::This secret must be a *service account key* from Google Cloud IAM (Keys → Add key → JSON).")
              print('::error::It must include "type": "service_account". Do not paste gspread_credentials.json / OAuth client JSON here.')
              sys.exit(1)
          for key in ("client_email", "private_key", "token_uri"):
              if not d.get(key):
                  print(f"::error::Service account JSON is missing {key!r}. Re-download the key from IAM or fix the secret value (truncation?).")
                  sys.exit(1)
          print(f"OK — service account email: {d['client_email']}")
          PY

      - name: Create OAuth credential files (for source copy when not shared with SA)
        if: steps.gate.outputs.run == 'yes'
        env:
          GSPREAD_CREDENTIALS_JSON: ${{ secrets.GSPREAD_CREDENTIALS_JSON }}
          GSPREAD_AUTHORIZED_USER_JSON: ${{ secrets.GSPREAD_AUTHORIZED_USER_JSON }}
        run: |
          if [ -n "$GSPREAD_CREDENTIALS_JSON" ] && [ -n "$GSPREAD_AUTHORIZED_USER_JSON" ]; then
            python -c "import os, pathlib; pathlib.Path('gspread_credentials.json').write_text(os.environ['GSPREAD_CREDENTIALS_JSON'], encoding='utf-8')"
            python -c "import os, pathlib; pathlib.Path('gspread_authorized_user.json').write_text(os.environ['GSPREAD_AUTHORIZED_USER_JSON'], encoding='utf-8')"
            echo "OAuth files created (fallback if service account cannot open source)"
          elif [ -n "$GSPREAD_CREDENTIALS_JSON" ] || [ -n "$GSPREAD_AUTHORIZED_USER_JSON" ]; then
            echo "::error::Set BOTH secrets on this repo: GSPREAD_CREDENTIALS_JSON and GSPREAD_AUTHORIZED_USER_JSON (or neither, if the source sheet is shared with the service account)."
            exit 1
          else
            echo "::warning::GSPREAD_* secrets not set. If the Flipkart SOURCE sheet is not shared with the service account, add both secrets OR share the sheet (see job log for client_email)."
          fi

      - name: Run Flipkart Debit Master sync
        if: steps.gate.outputs.run == 'yes'
        env:
          FLIPKART_ODH_SPREADSHEET_ID: ${{ secrets.FLIPKART_ODH_SPREADSHEET_ID }}
          WHAPI_TOKEN: ${{ secrets.WHAPI_TOKEN }}
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          HTML_TO_IMAGE_SERVICE_URL: ${{ secrets.HTML_TO_IMAGE_SERVICE_URL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        # Full run (email + WhatsApp when secrets exist). If your log shows --no-email --no-whatsapp, push this workflow file to GitHub.
        run: python flipkart_debit_master_sync.py

      - name: Upload logs on failure
        if: failure() && steps.gate.outputs.run == 'yes'
        uses: actions/upload-artifact@v4
        with:
          name: flipkart-debit-master-logs
          path: |
            *.log
            *_log.txt
          if-no-files-found: ignore
          retention-days: 7
